<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>注册</title>
	<link rel="stylesheet" type="text/css" href="../css/HeaderAndFooter.css">
	<link rel="stylesheet" href="../css/register.css" type="text/css">
</head>
<body>
	<div class="HeaderSearchNav"></div>
	<div class="register_b">
		<div class="title"><img src="../images/zc_03.gif"></div>
		<div class="detail">
			<div class="reg">
				<div class="l">
					<img src="../images/zc_07.gif" alt="">
				</div>	
				<div class="m">
					<form action="#" method="get" class="res_form" onsubmit="return false">
						<p>
							<span>用户名：</span>
							<input type="text" name="username" placeholder="请输入用户名" id="txt"><br>
							<strong></strong>
						</p>
						<p>
							<span>密 码：</span><input type="password" name="password" id="pas"><br>
							<i></i>
						</p>
						
						<p>
							<span>确认密码：</span><input type="password" name="password" id="paw"><br>
						</p>
						<div class="reg_b">
							<input type="submit" value="注册" class="reg_btn">
						</div>
					</form>
				</div>
				<div class="r"></div>
			</div>
			<div class="remind">
				<p><span>!</span>友情提示：注册成为会员您可以享受以下服务：</p>
				<ul>
					<li>1、存您的个人资料</li>
					<li>2、收藏您关注的商品</li>
					<li>3、享受会员积分制度</li>
					<li>4、订阅本商城商品信息</li>
				</ul>
			</div>
		</div>
	</div>
	<!-- 末端 -->
	<div class="footer"></div>

	<script src="/lib/requeryjs/require.js" data-main="/js/register"></script>
</body>
</html>
